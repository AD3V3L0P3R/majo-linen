function doLogin(){
  var pwd=document.getElementById('pwd').value.trim();
  document.getElementById('perr').textContent='';
  if(!pwd)return;
  document.getElementById('lbtn').textContent='...';
  google.script.run
    .withSuccessHandler(function(r){
      document.getElementById('lbtn').textContent='Accedi';
      if(!r){document.getElementById('perr').textContent='Password non riconosciuta';return;}
      role=r;
      document.getElementById('login').style.display='none';
      document.getElementById('app').style.display='flex';
      var labels={admin:'Amministratore',cleaner:'Eddie',runner:'Matteo',lavanderia:'Said'};
      document.getElementById('hrole').textContent=labels[r]||r;
      buildNav();loadInv();
    })
    .withFailureHandler(function(){document.getElementById('lbtn').textContent='Accedi';document.getElementById('perr').textContent='Errore di connessione';})
    .checkPassword(pwd);
}
document.getElementById('lbtn').addEventListener('click',doLogin);

function buildNav(){
  var D={
    admin:[{id:'dash',i:'&#128202;',l:'Dashboard'},{id:'checkin',i:'&#128719;',l:'Check-in'},{id:'manual',i:'&#128295;',l:'Manuale'},{id:'log',i:'&#128203;',l:'Log'},{id:'costs',i:'&#128182;',l:'Costi'},{id:'setup',i:'&#9881;',l:'Setup'},{id:'pwds',i:'&#128273;',l:'Accessi'}],
    cleaner:[{id:'dirty',i:'&#129978;',l:'Sporco'}],
    runner:[{id:'run',i:'&#128656;',l:'Azioni'}],
    lavanderia:[{id:'lav',i:'&#9989;',l:'Pronto'},{id:'incassi',i:'&#128176;',l:'Incassi'}]
  };
  var items=D[role]||[];
  document.getElementById('nav').innerHTML=items.map(function(x){return '<button class="nb off" id="nb'+x.id+'" onclick="goTo(\''+x.id+'\')"><span class="ni">'+x.i+'</span><span class="nl">'+x.l+'</span></button>';}).join('');

}
function goTo(v){view=v;document.querySelectorAll('.nb').forEach(function(b){b.className='nb off';});var b=document.getElementById('nb'+v);if(b)b.className='nb on';dq={};lq={};ITEMS.forEach(function(i){dq[i]=0;lq[i]=0;});if(v==='log')doLog();else if(v==='costs')doCosts();else if(v==='pwds')doPwds();else if(v==='incassi')doIncassi();else render();}

function loadInv(){rc('<div class="loading"><span class="spin"></span>Caricamento...</div>');google.script.run.withSuccessHandler(function(d){inv=d;ITEMS.forEach(function(i){dq[i]=0;lq[i]=0;});goTo(view);}).withFailureHandler(function(){toast('Errore caricamento','err');}).getInventory();}
function rc(h){document.getElementById('content').innerHTML=h;}
function tot(p,item){return ST.reduce(function(s,st){return s+(((inv[p]||{})[item]||{})[st]||0);},0);}
function cnt(p,st){return ITEMS.reduce(function(s,i){return s+(((inv[p]||{})[i]||{})[st]||0);},0);}

function renderDash(){
  var p=prop,pi=PI[p];
  var disp=cnt(p,'Disponibile'),sp=cnt(p,'Sporco'),lv=cnt(p,'In lavanderia'),pr=cnt(p,'Pronto per ritiro'),tt=disp+sp+lv+pr;
  function acc(item){var d=(inv[p]||{})[item]||{};return(d['Sporco']||0)>0?'#C81818':(d['Pronto per ritiro']||0)>0?'#B8711C':(d['In lavanderia']||0)>0?'#6B52A0':'#1F7A4A';}
  var h='<div class="pg">';
  h+='<div class="kpi-main"><div><div class="km-lbl">Disponibile ora</div><div class="km-num">'+disp+'</div></div><div class="km-r"><div class="km-addr">'+pi.addr+'</div><div class="km-name">'+pi.name+'</div></div></div>';
  h+='<div class="kpi-row"><div class="kc sp"><div class="kc-num">'+sp+'</div><div class="kc-lbl">Sporco</div></div><div class="kc lv"><div class="kc-num">'+lv+'</div><div class="kc-lbl">Lavanderia</div></div></div>';
  h+='<div class="kpi-row"><div class="kc pr"><div class="kc-num">'+pr+'</div><div class="kc-lbl">Pronto ritiro</div></div><div class="kc tt"><div class="kc-num">'+tt+'</div><div class="kc-lbl">Totale pezzi</div></div></div>';
  h+=sp>0?'<div class="chip warn">&#9888; '+sp+' pezzi sporchi</div>':pr>0?'<div class="chip info">&#128230; '+pr+' pronti</div>':'<div class="chip ok">&#10004; Tutto ok</div>';
  h+='<span class="slbl">Inventario dettagliato</span>';
  ITEMS.forEach(function(item){
    var d=(inv[p]||{})[item]||{},t=tot(p,item),a=acc(item),dv=d['Disponibile']||0;
    var bars=ST.map(function(st){var pc=t>0?(d[st]||0)/t*100:0;return '<div class="ic-seg" style="background:'+SC[st][0]+';width:'+pc+'%"></div>';}).join('');
    var pills=ST.filter(function(st){return(d[st]||0)>0;}).map(function(st){return '<span class="ic-pill" style="background:'+SC[st][1]+';color:'+SC[st][0]+'">'+d[st]+' '+st+'</span>';}).join('');
    h+='<div class="ic"><div class="ic-acc" style="background:'+a+'"></div><div class="ic-body"><div class="ic-top"><span class="ic-name">'+item+'</span><span class="ic-av" style="color:'+a+'">'+dv+'</span><span class="ic-tot">/ '+t+'</span></div><div class="ic-bar">'+bars+'</div><div class="ic-pills">'+(pills||'<span class="ic-pill" style="background:#f0f0f0;color:#aaa">0 pezzi</span>')+'</div></div></div>';
  });
  h+='</div>';rc(h);
}
function checkinCapacity(p){
  var min=MIN_CHECKIN[p]||{},rigid=[],rigidCap=Infinity;
  RIGID_ITEMS.forEach(function(item){
    var soglia=min[item]||0;if(soglia<=0)return;
    var disp=((inv[p]||{})[item]||{})['Disponibile']||0;
    var cap=Math.floor(disp/soglia);
    rigid.push({item:item,soglia:soglia,disp:disp,cap:cap});
    if(cap<rigidCap)rigidCap=cap;
  });
  if(rigidCap===Infinity)rigidCap=0;
  var lm=((inv[p]||{})['Lenzuolo Matrimoniale']||{})['Disponibile']||0;
  var cp=((inv[p]||{})['Copriletto']||{})['Disponibile']||0;
  var cm=((inv[p]||{})['Copripiumino Matrimoniale']||{})['Disponibile']||0;
  var beds=maxBeds(lm,cp,cm);
  var bedCap=Math.floor(beds/BEDS_PER_CHECKIN);
  var possibili=Math.min(rigidCap,bedCap);
  var need=possibili+1;
  // pezzi mancanti per il prossimo check-in
  var mancanti=[];
  rigid.forEach(function(x){var short=Math.max(0,x.soglia*need-x.disp);if(short>0)mancanti.push({item:x.item,short:short});});
  var targetBeds=BEDS_PER_CHECKIN*need;
  if(beds<targetBeds){
    var coversCM=Math.min(cm,targetBeds),sub=targetBeds-coversCM;
    var missLM=Math.max(0,(targetBeds+sub)-lm),missCP=Math.max(0,sub-cp);
    if(missLM>0)mancanti.push({item:'Lenzuolo Matrimoniale',short:missLM});
    if(missCP>0)mancanti.push({item:'Copriletto',short:missCP});
  }
  return {possibili:possibili,rigid:rigid,rigidCap:rigidCap,bedCap:bedCap,beds:beds,lm:lm,cp:cp,cm:cm,mancanti:mancanti};
}
function renderCheckin(){
  var h='<div class="pg"><div class="ptitle">Check-in disponibili</div><div class="psub">Quanti check-in da 4 ospiti (2 letti) puoi ancora coprire con la biancheria pulita in armadio. I check-in eccezionali a 3 letti consumano di piu.</div>';
  ['Majo','Nievo'].forEach(function(p){
    var c=checkinCapacity(p),pi=PI[p];
    var col=c.possibili>=2?'var(--green)':(c.possibili===1?'var(--orange)':'var(--red)');

  if(rp)rp.textContent=lt+' pezzi';if(ra)ra.textContent='&euro;'+rc2.toFixed(2);
  if(btn){btn.className='cfbtn '+(lt>0?'on':'off');btn.textContent=lt>0?'Conferma '+lt+' pezzi - '+PI[p].name:'Nessun pezzo per '+PI[p].name;}
  var tp=0,te=0;['Majo','Nievo'].forEach(function(pp){tp+=ITEMS.reduce(function(s,i){return s+(lq[pp+i]||0);},0);te+=ITEMS.reduce(function(s,i){return s+(lq[pp+i]||0)*(COSTS[i]||0);},0);});
  var sp=document.getElementById('said-pezzi'),se=document.getElementById('said-euro');
  if(sp)sp.textContent=tp;if(se)se.textContent='&euro;'+te.toFixed(2);
}
function confLav(p){
  var items=ITEMS.map(function(item){return {item:item,qty:lq[p+item]||0};}).filter(function(i){return i.qty>0;});
  if(!items.length)return;
  var inc=items.filter(function(x){return x.qty>(((inv[p]||{})[x.item]||{})['In lavanderia']||0);});
  if(inc.length>0)showModal(p,items,inc);else doLav(p,items);
}
function showModal(p,items,inc){
  var lines=inc.map(function(x){var il=((inv[p]||{})[x.item]||{})['In lavanderia']||0;return '<div class="md-item">&#9888; '+x.item+': dichiarati '+x.qty+', ricevuti '+il+'</div>';}).join('');
  var m=document.createElement('div');m.className='mo';m.id='mdl';
  m.innerHTML='<div class="md"><h3>Conteggio piu alto del previsto</h3><p>Stai dichiarando piu pezzi di quanti ne risultino "in lavanderia". Nessun problema: significa che il conteggio a monte era impreciso. Confermando, il sistema riallinea da solo i pezzi e avvisa l\'amministratore. Nessun pezzo va perso.</p><div>'+lines+'</div><div class="md-btns"><button class="md-btn mb-c" onclick="closeModal()">Correggi</button><button class="md-btn mb-ok" onclick="doLav(null,null,true)">Confermo</button></div></div>';
  document.body.appendChild(m);pending={p:p,items:items};
}
function closeModal(){var m=document.getElementById('mdl');if(m)m.remove();pending=null;}
function doLav(p,items,fromModal){
  if(fromModal&&pending){p=pending.p;items=pending.items;}
  closeModal();if(!items||!items.length)return;
  var lt=items.reduce(function(s,i){return s+i.qty;},0);
  rc('<div class="loading"><span class="spin"></span>Salvataggio...</div>');
  google.script.run.withSuccessHandler(function(r){if(r.ok){ITEMS.forEach(function(i){lq[p+i]=0;});succScreen('&#9989;','Registrato!',lt+' pezzi pronti per il ritiro.',function(){rc('<div class="loading"><span class="spin"></span>Annullando...</div>');google.script.run.withSuccessHandler(function(r2){r2.ok?toast('Annullato'):toast(r2.error||'Errore','err');loadInv();}).withFailureHandler(function(){toast('Errore','err');loadInv();}).undoClean(p,r.moves||[],'undo');});}else{toast(r.error||'Errore','err');loadInv();}}).withFailureHandler(function(){toast('Errore','err');render();}).registerBulkClean(p,items,'lavanderia');
}
function succScreen(ico,title,sub,undoFn){
  var secs=30,id='undo-'+Date.now();
  rc('<div class="succ"><div class="succ-ico">'+ico+'</div><div class="succ-ttl">'+title+'</div><div class="succ-sub">'+sub+'</div><button class="succ-btn" onclick="loadInv()" style="margin-bottom:12px">Fine</button>'+(undoFn?'<button class="undo-btn" id="'+id+'" onclick="doUndo()">Annulla ('+secs+'s)</button>':'')+'</div>');
  if(undoFn){lastAction=undoFn;var timer=setInterval(function(){secs--;var el=document.getElementById(id);if(!el||secs<=0){clearInterval(timer);if(el)el.style.display='none';lastAction=null;return;}el.textContent='Annulla ('+secs+'s)';},1000);}
}
function doUndo(){if(!lastAction)return;lastAction();lastAction=null;}
function doPwds(){rc('<div class="loading"><span class="spin"></span>Caricamento...</div>');google.script.run.withSuccessHandler(function(users){renderUsers(users);}).withFailureHandler(function(){toast('Errore','err');}).getAllUsers();}
function renderUsers(users){
  function rL(r){return {admin:'Admin',cleaner:'Cleaner',runner:'Runner',lavanderia:'Lavanderia'}[r]||r;}
  function rC(r){return {admin:'var(--red)',cleaner:'var(--orange)',runner:'var(--green)',lavanderia:'var(--purple)'}[r]||'var(--gray)';}
  var ro=ROLE_OPTIONS.map(function(o){return '<option value="'+o.v+'">'+o.l+'</option>';}).join('');
  var h='<div class="pg"><div class="ptitle">Gestione accessi</div><div class="psub">Utenti attivi: '+users.length+'</div>';
  users.forEach(function(u){
    h+='<div class="ucard" id="uc'+u.id+'"><div class="ucard-view"><div><div class="ucard-name">'+u.name+'</div><div class="ucard-role" style="color:'+rC(u.role)+'">'+rL(u.role)+' &bull; ****</div></div>';
    h+='<div class="ucard-btns"><button class="ubtn edit" onclick="editUser(\''+u.id+'\')">Mod</button><button class="ubtn del" onclick="delUser(\''+u.id+'\',\''+u.name+'\')">Del</button></div></div>';
    h+='<div class="ucard-edit" id="ue'+u.id+'" style="display:none"><input class="uedit-input" id="un'+u.id+'" value="'+u.name+'" placeholder="Nome"><select class="uedit-sel" id="ur'+u.id+'">'+ROLE_OPTIONS.map(function(o){return '<option value="'+o.v+'"'+(u.role===o.v?' selected':'')+'>'+o.l+'</option>';}).join('')+'</select><input class="uedit-input" id="up'+u.id+'" value="'+u.pwd+'" placeholder="Password" type="text"><div class="ucard-btns" style="margin-top:8px"><button class="ubtn save" onclick="saveUser(\''+u.id+'\')">Salva</button><button class="ubtn cancel" onclick="cancelEdit(\''+u.id+'\')">X</button></div></div></div>';
  });
  h+='<div class="slbl" style="margin-top:20px">Aggiungi utente</div><div class="new-user-form"><input class="uedit-input" id="new-name" placeholder="Nome"><select class="uedit-sel" id="new-role">'+ro+'</select><input class="uedit-input" id="new-pwd" placeholder="Password (min 3 caratteri)" type="text"><button class="cfbtn on" onclick="addNewUser()" style="margin-top:4px">+ Aggiungi utente</button></div></div>';
  rc(h);
}
function editUser(id){document.getElementById('uc'+id).querySelector('.ucard-view').style.display='none';document.getElementById('ue'+id).style.display='block';}
function cancelEdit(id){document.getElementById('uc'+id).querySelector('.ucard-view').style.display='flex';document.getElementById('ue'+id).style.display='none';}
function saveUser(id){var name=document.getElementById('un'+id).value.trim(),r2=document.getElementById('ur'+id).value,pwd=document.getElementById('up'+id).value.trim();google.script.run.withSuccessHandler(function(r){if(r.ok){toast('Salvato');doPwds();}else toast(r.error||'Errore','err');}).withFailureHandler(function(){toast('Errore','err');}).updateUser(id,name,r2,pwd);}
function delUser(id,name){if(!confirm('Eliminare '+name+'?'))return;google.script.run.withSuccessHandler(function(r){if(r.ok){toast(name+' eliminato');doPwds();}else toast(r.error||'Errore','err');}).withFailureHandler(function(){toast('Errore','err');}).deleteUser(id);}
function addNewUser(){var name=document.getElementById('new-name').value.trim(),r2=document.getElementById('new-role').value,pwd=document.getElementById('new-pwd').value.trim();if(!name){toast('Nome obbligatorio','err');return;}if(!pwd||pwd.length<3){toast('Password troppo corta','err');return;}google.script.run.withSuccessHandler(function(r){if(r.ok){toast(name+' aggiunto');doPwds();}else toast(r.error||'Errore','err');}).withFailureHandler(function(){toast('Errore','err');}).addUser(name,r2,pwd);}
function doLog(){rc('<div class="loading"><span class="spin"></span>Caricamento...</div>');google.script.run.withSuccessHandler(function(entries){if(!entries||!entries.length){rc('<div class="le">Nessun movimento registrato</div>');return;}var h='';entries.forEach(function(e){var c=SC[e.to]||['#888','#eee'];h+='<div class="lr"><div class="ld" style="background:'+c[0]+'"></div><div><div class="lt">'+e.qty+'x '+e.item+' > '+e.to+'</div><div class="lm">'+e.prop+' - '+e.ts+' - '+e.role+'</div>'+(e.note?'<div class="ln">! '+e.note+'</div>':'')+'</div></div>';});rc(h);}).withFailureHandler(function(e){rc('<div class="pg"><div class="le">Impossibile caricare il log.<br><span style="font-size:11px;color:var(--gray)">'+((e&&e.message)?e.message:'Errore server')+'</span><br><br><button class="cfbtn on" onclick="doLog()">Riprova</button></div></div>');}).getMovements(80);}
function doCosts(){rc('<div class="loading"><span class="spin"></span>Caricamento...</div>');google.script.run.withSuccessHandler(function(d){if(!d){rc('<div class="pg"><div class="le">Nessun dato</div></div>');return;}var h='<div class="pg"><div class="chero"><div class="chero-num">&euro;'+(Number(d.totalDue)||0).toFixed(2)+'</div><div class="chero-lbl">Totale da saldare</div></div>';['Majo','Nievo'].forEach(function(p){var b=(d.byHouse&&d.byHouse[p])||{due:0,pieces:0};var can=Number(b.due)>0.005;h+='<div style="background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:10px;display:flex;align-items:center;justify-content:space-between"><div><div class="sname">'+p+'</div><div style="font-size:11px;color:var(--gray)">'+b.pieces+' pezzi da saldare</div></div><div style="font-weight:700;font-size:18px;color:var(--purple)">&euro;'+(Number(b.due)||0).toFixed(2)+'</div></div>';h+='<button class="cfbtn '+(can?'on':'off')+'" '+(can?'onclick="askSettle(\''+p+'\',\'admin\','+Number(b.due)+')"':'disabled')+' style="margin-top:6px">'+(can?'Salda '+p+' - &euro;'+(Number(b.due)||0).toFixed(2):p+' - niente da saldare')+'</button>';});if(d.lastSettlement){h+='<button class="undo-btn" style="margin-top:14px;width:100%" onclick="askUndoSettle(\''+d.lastSettlement.id+'\',\'admin\','+(Number(d.lastSettlement.amount)||0)+',\''+String(d.lastSettlement.label||'').replace(/['"]/g,'')+'\')">Annulla ultimo saldo - &euro;'+(Number(d.lastSettlement.amount)||0).toFixed(2)+'</button>';}h+='<span class="slbl" style="margin-top:18px">Voci da saldare</span>';if(!d.rows||!d.rows.length)h+='<div class="le">Tutto saldato</div>';else d.rows.forEach(function(r){h+='<div class="crow"><div><div class="cname">'+r.item+' x'+r.qty+'</div><div class="cmeta">'+r.prop+' - '+r.date+'</div></div><div class="camt">&euro;'+(Number(r.total)||0).toFixed(2)+'</div></div>';});if(Number(d.totalPaid)>0.005)h+='<div style="text-align:center;font-size:11px;color:var(--gray);margin-top:14px">Storico gia saldato: &euro;'+(Number(d.totalPaid)||0).toFixed(2)+'</div>';h+='</div>';rc(h);}).withFailureHandler(function(e){rc('<div class="pg"><div class="le">Impossibile caricare i costi.<br><span style="font-size:11px;color:var(--gray)">'+((e&&e.message)?e.message:'Errore server')+'</span><br><br><button class="cfbtn on" onclick="doCosts()">Riprova</button></div></div>');}).getCostSummary();}
function doIncassi(){rc('<div class="loading"><span class="spin"></span>Caricamento...</div>');google.script.run.withSuccessHandler(function(d){if(!d){rc('<div class="pg"><div class="le">Nessun dato</div></div>');return;}var tot=Number(d.totalDue)||0;var h='<div class="pg"><div class="ptitle">Incassi lavanderia</div><div class="psub">Quanto devi ancora ricevere per i capi gia consegnati puliti.</div>';h+='<div class="said-total" style="margin-top:4px"><div class="said-total-title">Da incassare</div><div class="said-total-row"><span>Importo totale</span><span class="said-total-val said-euro">&euro;'+tot.toFixed(2)+'</span></div>';['Majo','Nievo'].forEach(function(p){var b=(d.byHouse&&d.byHouse[p])||{due:0,pieces:0};h+='<div class="said-total-row"><span>'+p+' ('+b.pieces+' pezzi)</span><span class="said-total-val">&euro;'+(Number(b.due)||0).toFixed(2)+'</span></div>';});h+='</div>';var can=tot>0.005;h+='<button class="cfbtn '+(can?'on':'off')+'" '+(can?'onclick="askSettle(\'ALL\',\'lavanderia\','+tot+')"':'disabled')+' style="margin-top:14px">'+(can?'Ho ricevuto il pagamento - &euro;'+tot.toFixed(2):'Niente da incassare')+'</button>';h+='<span class="slbl" style="margin-top:18px">Voci da incassare</span>';if(!d.rows||!d.rows.length)h+='<div class="le">Tutto incassato</div>';else d.rows.forEach(function(r){h+='<div class="crow"><div><div class="cname">'+r.item+' x'+r.qty+'</div><div class="cmeta">'+r.prop+' - '+r.date+'</div></div><div class="camt">&euro;'+(Number(r.total)||0).toFixed(2)+'</div></div>';});h+='</div>';rc(h);}).withFailureHandler(function(e){rc('<div class="pg"><div class="le">Impossibile caricare gli incassi.<br><span style="font-size:11px;color:var(--gray)">'+((e&&e.message)?e.message:'Errore server')+'</span><br><br><button class="cfbtn on" onclick="doIncassi()">Riprova</button></div></div>');}).getCostSummary();}
function openConfirm(title,msg,yesLabel,yesOnclick){var m=document.createElement('div');m.className='mo';m.id='mdl';m.innerHTML='<div class="md"><h3>'+title+'</h3><p>'+msg+'</p><div class="md-btns"><button class="md-btn mb-c" onclick="closeModal()">Annulla</button><button class="md-btn mb-ok" onclick="'+yesOnclick+'">'+yesLabel+'</button></div></div>';document.body.appendChild(m);}
function askSettle(prop,role,amount){var who=prop==='ALL'?'entrambe le case':prop;openConfirm('Confermi il saldo?','Stai registrando il pagamento di &euro;'+(Number(amount)||0).toFixed(2)+' per '+who+'. Il dovuto tornera a 0 e le voci verranno marcate come saldate. Lo storico resta consultabile.','Conferma saldo',"doSettle('"+prop+"','"+role+"')");}
function doSettle(prop,role){closeModal();rc('<div class="loading"><span class="spin"></span>Registro il saldo...</div>');google.script.run.withSuccessHandler(function(r){if(r&&r.ok&&r.batchId){var bid=r.batchId,amt=(Number(r.settled)||0).toFixed(2);succScreen('\u2705','Saldo registrato','Hai registrato un pagamento di \u20ac'+amt+'.',function(){rc('<div class="loading"><span class="spin"></span>Annullando...</div>');google.script.run.withSuccessHandler(function(r2){(r2&&r2.ok)?toast('Saldo annullato'):toast((r2&&r2.error)||'Errore','err');if(role==='lavanderia')doIncassi();else doCosts();}).withFailureHandler(function(){toast('Errore','err');if(role==='lavanderia')doIncassi();else doCosts();}).undoSettle(bid,role);});}else{toast((r&&r.error)||'Niente da saldare','err');if(role==='lavanderia')doIncassi();else doCosts();}}).withFailureHandler(function(){toast('Errore','err');if(role==='lavanderia')doIncassi();else doCosts();}).settleCosts(prop,role);}
function askUndoSettle(id,role,amount,label){openConfirm('Annullare l\'ultimo saldo?','Riporti a "da saldare" le voci dell\'ultimo saldo registrato: &euro;'+(Number(amount)||0).toFixed(2)+(label?' ('+label+')':'')+'. Vuoi procedere?','Annulla saldo',"doUndoSettle('"+id+"','"+role+"')");}
function doUndoSettle(id,role){closeModal();rc('<div class="loading"><span class="spin"></span>Annullando il saldo...</div>');google.script.run.withSuccessHandler(function(r){(r&&r.ok)?toast('Saldo annullato'):toast((r&&r.error)||'Errore','err');if(role==='lavanderia')doIncassi();else doCosts();}).withFailureHandler(function(){toast('Errore','err');doCosts();}).undoSettle(id,role);}
function toast(msg,type){type=type||'ok';var t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(function(){t.className='';},2800);}
</script>
</body>
</html>
